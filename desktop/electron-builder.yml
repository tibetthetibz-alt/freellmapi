appId: com.freellmapi.desktop
productName: FreeLLMAPI
directories:
  output: dist-electron
files:
  - build/**/*
  - renderer/**/*
  - assets/**/*
  - "!**/*.map"
asar: true
asarUnpack:
  - "**/node_modules/better-sqlite3/**/*.node"
  - "**/node_modules/better-sqlite3/build/Release/**"
# client-dist is staged into desktop/ by `npm run stage:client` (scripts/stage-client.mjs).
# It MUST stay a path inside desktop/: a `../` source makes electron-builder treat the
# repo root as a copy base and reject every root file ("must be under .../desktop/").
extraResources:
  - from: client-dist
    to: client-dist
mac:
  category: public.app-category.developer-tools
  icon: assets/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: assets/entitlements.mac.plist
  entitlementsInherit: assets/entitlements.mac.inherit.plist
  notarize: false
  identity: null
  target:
    - target: dmg
      arch:
        - arm64
  extendInfo:
    LSUIElement: 1
win:
  target:
    - target: nsis
      arch:
        - x64
  # electron-builder converts a >=256px PNG to .ico at build time.
  icon: assets/appicon_1024.png
nsis:
  oneClick: true
  deleteAppDataOnUninstall: false
